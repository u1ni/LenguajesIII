<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro ucasal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light"> <div class="container mt-5">
        
        <div class="row justify-content-center">
            
            <div class="col-12 col-md-6 col-lg-5"> 
                
                <div class="shadow-sm rounded-4 bg-white p-4 border">
                    <h3 class="fw-bold text-center mb-4">Registro de los alumnos</h3>
                    
                    <div id="formResult" class="alert d-none" role="alert"></div>
                    
                    <form id="formulario" novalidate>
                        
                        <div class="mb-3">
                            <label for="nombre" class="form-label mb-1 fw-semibold text-secondary">Nombre</label>
                            <input type="text" class="form-control form-control-sm" id="nombre" placeholder="Ingrese su nombre">
                            <div class="invalid-feedback"></div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="apellido" class="form-label mb-1 fw-semibold text-secondary">Apellido</label>
                            <input type="text" class="form-control form-control-sm" id="apellido" placeholder="Ingrese su apellido">
                            <div class="invalid-feedback"></div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label mb-1 fw-semibold text-secondary">Email Institucional</label>
                            <input type="email" class="form-control form-control-sm" id="email" placeholder="usuario@ucasal.edu.ar">
                            <div class="invalid-feedback"></div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="fecha" class="form-label mb-1 fw-semibold text-secondary">Fecha de Nacimiento</label>
                            <input type="date" class="form-control form-control-sm" id="fecha">
                            <div class="invalid-feedback"></div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label mb-1 fw-semibold text-secondary">Contraseña</label>
                            <input type="password" class="form-control form-control-sm" id="password" placeholder="Mínimo 6 caracteres">
                            <div class="invalid-feedback"></div>
                        </div>
                        
                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label mb-1 fw-semibold text-secondary">Confirmar contraseña</label>
                            <input type="password" class="form-control form-control-sm" id="confirmPassword" placeholder="Repita su contraseña">
                            <div class="invalid-feedback"></div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Enviar Registro</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/script.js"></script>
</body>
</html>
