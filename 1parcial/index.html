<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Inscripcion al curso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
</head>
<body style="background-color: #f4f6f9;">

<div class="container" style="max-width: 600px; margin-top: 40px;">
    
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white text-center">
            <h3> Formulario inscripcion</h3>
        </div>
        <!-- campos donde el usuario debe de ingresar sus datos -->
        <div class="card-body">
            <div class="mb-3">
                <label>Nombre y apellido: </label>
                <input type="text" id="campo_nombre" class="form-control" placeholder="Solo se permiten letras y un minimo de 3 caracteres">
                <span id="errornombre" class="error"></span>
            </div>

            <div class="mb-3">
                <label>DNI: </label>
                <input type="text" id="campo_dni" class="form-control" placeholder="El dni debe ser exacatamente de 8 numeros" maxlength="8">
                <span id="errordni" class="error"></span>
            </div>

            <div class="mb-3">
                <label>Fecha de nacimiento: </label>
                <input type="date" id="campo_nacimiento" class="form-control">
                <span id="errornacimiento" class="error"></span>
            </div>
            <!-- mensaje de exito de que la inscipcion se completo con exito -->
            <br>
            <center><div id="mensajeexito" class="exito" style="display: none;">Inscripcion completada</div></center>
            <br>
            <!-- boton de mandar la inscripcion y si la inscrpcion es valida el boton de preguntas progresivas se habilita (eso en el js) -->
            <button class="btn btn-primary w-100 mb-2" onclick="enviarformulario()">Enviar inscripcion</button>
            <button class="btn btn-outline-secondary w-100" onclick="hacerpreguntas()">Preguntas progresivas</button>
        </div> 
    </div> 
    <!-- mostramos las respuestas de la encuestra que el usuario escribio -->
    <div id="casilla_respuestas" class="card shadow-sm mt-4 p-3 border-secondary" style="display: none; background: white;">
        <h5 class="text-center">Respuestas de la encuesta: </h5>
        <div id="mostrarrespuestas"></div>
    </div>
    
</div> 

<script src="js/script.js"></script>

</body>
</html>
