<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de tareas</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="style/style.css">
</head>
<body class="bg-light transition-tema">
    <button id="btnDarkMode" class="btn btn-dark position-absolute top-0 end-0 m-3 shadow">Modo Oscuro</button>

    <div class="container-fluid mt-5 px-4">
        <h1 id="titulo" class="mb-4 text-center fw-bold">Gestor de tareas</h1>
        
        <div class="row">
            <div class="col-lg-9">
                <div class="card shadow-sm p-4 mb-4 bg-white rounded border-0 tarjeta-tema">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label for="tarea" class="form-label fw-semibold text-secondary lbl-tema">Nombre de la tarea</label>
                            <input type="text" id="tarea" class="form-control input-tema" placeholder="Ej: TP XX de lenguajesIII">
                        </div>
                        <div class="col-md-3">
                            <label for="prioridad" class="form-label fw-semibold text-secondary lbl-tema">Prioridad</label>
                            <select id="prioridad" class="form-select input-tema">
                                <option value="Alta">Alta</option>
                                <option value="Media" selected>Media</option>
                                <option value="Baja">Baja</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label for="fechaLimite" class="form-label fw-semibold text-secondary lbl-tema">Fecha Límite</label>
                            <input type="date" id="fechaLimite" class="form-control input-tema">
                        </div>
                        <div class="col-md-2 d-grid align-items-end">
                            <button id="btnAccion" class="btn btn-primary fw-bold">Agregar</button>
                        </div>
                        
                        <div class="col-md-6">
                            <label for="archivo" class="form-label fw-semibold text-secondary lbl-tema">Archivo (PDF)</label>
                            <input type="file" id="archivo" class="form-control input-tema" accept=".pdf">
                            
                            <div id="archivoActualContainer" class="d-none mt-2">
                                <a href="#" target="_blank" class="badge bg-info text-dark text-decoration-none" id="archivoTexto"></a>
                                <button type="button" class="btn btn-sm btn-outline-danger py-0 px-1 ms-2" id="btnQuitarArchivo">Eliminar PDF</button>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="notas" class="form-label fw-semibold text-secondary lbl-tema">Notas (Opcional)</label>
                            <textarea id="notas" class="form-control input-tema" rows="2" placeholder="Detalles de la tarea..."></textarea>
                        </div>
                    </div>
                </div>

                <ul class="nav nav-tabs mb-3" id="tabsTareas" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active fw-bold text-primary" id="pendientes-tab" data-bs-toggle="tab" data-bs-target="#pendientes" type="button" role="tab">Pendientes</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link fw-bold text-success" id="completadas-tab" data-bs-toggle="tab" data-bs-target="#completadas" type="button" role="tab">Completadas</button>
                    </li>
                </ul>

                <div class="tab-content">
                    <div class="tab-pane fade show active" id="pendientes" role="tabpanel">
                        <div class="card shadow-sm p-4 bg-white rounded border-0 tarjeta-tema">
                            <table id="tablaTareas" class="table table-hover w-100 tabla-tema">
                                <thead class="table-light th-tema">
                                    <tr>
                                        <th>Tarea</th>
                                        <th>Prioridad</th>
                                        <th>Vencimiento</th>
                                        <th>Notas</th>
                                        <th>Archivo</th>
                                        <th>Acción</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>

                    <div class="tab-pane fade" id="completadas" role="tabpanel">
                        <div class="card shadow-sm p-4 bg-white rounded border-0 tarjeta-tema border-success border-top border-4">
                            <table id="tablaCompletadas" class="table table-hover w-100 tabla-tema">
                                <thead class="table-light th-tema">
                                    <tr>
                                        <th>Tarea</th>
                                        <th>Prioridad</th>
                                        <th>Vencimiento</th>
                                        <th>Notas</th>
                                        <th>Archivo</th>
                                        <th>Acción</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-3 mt-4 mt-lg-0">
                <div class="card shadow-sm p-3 bg-white rounded border-0 tarjeta-tema h-100">
                    <h5 class="fw-bold text-center mb-3">Próximos a Vencer</h5>
                    <ul id="listaRecordatorios" class="list-group list-group-flush">
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    
    <script src="js/script.js"></script>
</body>
</html>
