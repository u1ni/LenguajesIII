<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de tareas</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="style/style.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        
        <h1 id="titulo" class="mb-4 text-center fw-bold">Gestor de tareas </h1>
        
        <div class="card shadow-sm p-4 mb-4 bg-white rounded border-0">
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="tarea" class="form-label fw-semibold text-secondary">Nombre de la tarea</label>
                    <input type="text" id="tarea" class="form-control" placeholder="Ej: TP XX de lenguajesIII">
                </div>
                <div class="col-md-4">
                    <label for="prioridad" class="form-label fw-semibold text-secondary">Prioridad</label>
                    <select id="prioridad" class="form-select">
                        <option value="Alta">Alta</option>
                        <option value="Media" selected>Media</option>
                        <option value="Baja">Baja</option>
                    </select>
                </div>
                <div class="col-md-2 d-grid align-items-end">
                    <button id="btnAccion" class="btn btn-primary fw-bold">Agregar</button>
                </div>
            </div>
        </div>

        <div class="card shadow-sm p-4 bg-white rounded border-0">
            <table id="tablaTareas" class="table table-hover w-100">
                <thead class="table-light">
                    <tr>
                        <th>Tarea</th>
                        <th>Prioridad</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    
    <script src="js/script.js"></script>
</body>
</html>
