<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Torneo e-sport - Repaso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
</head>
<body style="background-color: #f1f3f5;">

<div class="container" style="margin-top: 2rem; max-width: 850px;">
    
    <h1><center>Formulario de torneo</center></h1>
    <hr>

    <div class="card" id="caja_datos_personales">
        <div class="card-header bg-dark text-white">
            <strong>1. Datos del Jugador</strong>
        </div>
        <div class="card-body">
            
            <label>Nickname:</label>
            <input type="text" id="campo_nickname" class="form-control" placeholder="Mínimo 3 letras o números">
            <span id="falla_nick" class="manejoerror"></span>
            <br>

            <label>Edad:</label>
            <input type="number" id="campo_edad_jugador" class="form-control">
            <span id="falla_edad" class="manejoerror"></span>
            <br>

            <label>Código de equipo:</label>
            <input type="text" id="campo_codigo_team" class="form-control" maxlength="4">
            <span id="falla_codigo" class="manejoerror"></span>
            
        </div>
    </div>
    <br>

    <div class="card">
        <div class="card-header bg-dark text-white">
            <strong>2. Selección de juego</strong>
        </div>
        <div class="card-body">
            <div class="row">
                
                <div class="col-sm-4 text-center">
                    <div class="tarjuego" onclick="seleccionar_card(this, 'Minecraft')">
                        <img src="https://gaming-cdn.com/images/news/articles/8241/cover/1000x563/a-partir-de-ahora-minecraft-tendra-varias-actualizaciones-gratis-al-ano-cover66df1e5ce5940.jpg">
                        <p><b>Minecraft</b></p>
                    </div>
                </div>
                
                <div class="col-sm-4 text-center">
                    <div class="tarjuego" onclick="seleccionar_card(this, 'Fortnite')">
                        <img src="https://static.wikia.nocookie.net/fortnite/images/8/84/Season_1.jpg/revision/latest?cb=20231016165939">
                        <p><b>Fortnite</b></p>
                    </div>
                </div>
                
                <div class="col-sm-4 text-center">
                    <div class="tarjuego" onclick="seleccionar_card(this, 'Valorant')">
                        <img src="https://fotos.perfil.com/2020/05/04/trim/1140/641/valorant-videojuego-950425.jpg">
                        <p><b>Valorant</b></p>
                    </div>
                </div>

                <div class="col-sm-4 text-center mt-2">
                    <div class="tarjuego" onclick="seleccionar_card(this, 'FIFA 25')">
                        <img src="https://media.vandal.net/m/7-2024/17/202471715564644_1.jpg">
                        <p><b>FIFA 25</b></p>
                    </div>
                </div>
                
                <div class="col-sm-4 text-center mt-2">
                    <div class="tarjuego" onclick="seleccionar_card(this, 'Among Us')">
                        <img src="https://assets.nintendo.com/image/upload/c_fill,w_1200/q_auto:best/f_auto/dpr_2.0/store/software/switch/70010000036098/758ab0b61205081da2466386940752c70e0e5ea43bd39e8b9b13eaa455c69b7e">
                        <p><b>Among Us</b></p>
                    </div>
                </div>
                
                <div class="col-sm-4 text-center mt-2">
                    <div class="tarjuego" onclick="seleccionar_card(this, 'Rocket League')">
                        <img src="https://www.gaimx.de/skin/frontend/gaimx/default/images/uploads/rocket1-w800.jpg">
                        <p><b>Rocket League</b></p>
                    </div>
                </div>

            </div>
            <br>
            <center><span id="falla_juego" class="manejoerror"></span></center>
        </div>
    </div>
    
    <br>
    <button type="button" class="btn btn-primary btn-lg" style="width: 100%;" onclick="verificar_y_registrar()">Registrar</button>
    <br><br>

    <div id="pantalla_preparacion" style="display: none; background-color: #d1e7dd; padding: 20px; border: 2px solid #0f5132; border-radius: 8px;">
        <h3 style="color: #0f5132; text-align: center;">Registro exitoso</h3>
        <center>
            <button class="btn btn-success" onclick="arrancar_preguntas_prompt()">Formulario</button>
        </center>
        <br>
        <div id="volcado_de_respuestas" style="display: none; background: white; padding: 15px; border: 1px solid #ccc;"></div>
    </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
