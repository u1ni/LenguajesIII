<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora académica</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="container text-center mt-4 mb-4">
        <h1>Calculadora academica</h1>
    </div>

    <div class="container pb-5" style="max-width: 760px;">

        <div class="card mb-4 border-primary">
            <div class="card-header bg-primary text-white">
                Agregar materia
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="materia" class="form-label">Nombre de la materia</label>
                        <input type="text" id="materia" class="form-control" placeholder="Ej: Matemáticas" />
                    </div>
                    <div class="col-md-3">
                        <label for="nota" class="form-label">Nota (0 – 10)</label>
                        <input type="number" id="nota" class="form-control" placeholder="Ej: 8" min="0" max="10" step="0.1" />
                    </div>
                    <div class="col-md-3 d-flex align-items-end">
                        <button class="btn btn-primary w-100" onclick="agregarMateria()">Agregar</button>
                    </div>
                </div>
                <div id="error" class="mt-2"></div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center">
                <span>Lista de materias</span>
                <button class="btn btn-sm btn-light" onclick="limpiarTodo()">Limpiar todo</button>
            </div>
            <div class="card-body p-0">
                <div id="lista" class="p-3 text-muted">
                    Aún no hay materias registradas.
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header bg-success text-white">
                Resumen estadístico
            </div>
            <div class="card-body">
                <div id="resumen" class="text-muted">
                    Aún no hay materias registradas.
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
